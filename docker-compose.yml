name: pi-dashboard

services:

  # ─────────────────────────────────────────────────────────────────────────
  # Backend — FastAPI + WebSocket hub, modular data collectors
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    image: pi-dashboard-backend:latest
    container_name: pi-dashboard-backend
    restart: unless-stopped
    env_file: .env
    pid: "host"          # allows pkill to reach host processes (kiosk exit)
    networks:
      - dashboard-net
      - dadjet_co2_co2net   # access co2mond metrics at http://co2mond:9999/metrics
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — React SPA built with Vite, served by nginx
  # nginx also reverse-proxies /ws and /api/ → backend
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_ROTATE_ENABLED:   ${VITE_ROTATE_ENABLED:-false}
        VITE_ROTATE_INTERVAL:  ${VITE_ROTATE_INTERVAL:-20}
        VITE_CO2_OK:           ${VITE_CO2_OK:-800}
        VITE_CO2_WARN:         ${VITE_CO2_WARN:-1000}
        VITE_CO2_BAD:          ${VITE_CO2_BAD:-1500}
        VITE_CO2_MAX:          ${VITE_CO2_MAX:-2000}
        VITE_CO2_HISTORY:      ${VITE_CO2_HISTORY:-30}
        VITE_TEMP_COLD:        ${VITE_TEMP_COLD:-18}
        VITE_TEMP_WARM:        ${VITE_TEMP_WARM:-24}
        VITE_TEMP_SCALE_MIN:   ${VITE_TEMP_SCALE_MIN:-10}
        VITE_TEMP_SCALE_MAX:   ${VITE_TEMP_SCALE_MAX:-40}
        VITE_PLANTS_PER_PAGE:  ${VITE_PLANTS_PER_PAGE:-3}
    image: pi-dashboard-frontend:latest
    container_name: pi-dashboard-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - dashboard-net
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  dashboard-net:
    driver: bridge
  dadjet_co2_co2net:
    external: true
