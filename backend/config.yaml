# Pi Dashboard — backend module configuration
# Значения берутся из .env (через docker-compose env_file).
# Синтаксис: ${VAR} — подставляется из окружения контейнера.

modules:

  # ── CO2 sensor via co2mond Prometheus metrics ──────────────────────────
  - id: co2
    enabled: true
    interval: ${CO2_INTERVAL}
    config:
      metrics_url: "${CO2_METRICS_URL}"

  # ── Internet connectivity check ────────────────────────────────────────
  - id: internet
    enabled: true
    interval: ${INTERNET_INTERVAL}
    config:
      targets:
        - name: "Google"
          url: "https://8.8.8.8"
        - name: "Cloudflare"
          url: "https://1.1.1.1"
        - name: "Яндекс"
          url: "https://ya.ru"

  # ── Plants (tuya-exporter → Pushgateway) ──────────────────────────────
  - id: plants
    enabled: true
    interval: ${PLANTS_INTERVAL}
    config:
      pushgateway_url: "${PLANTS_PUSHGATEWAY_URL}"
      proxy_host: "${PLANTS_PROXY_HOST}"
      proxy_port: ${PLANTS_PROXY_PORT}
      proxy_user: "${PLANTS_PROXY_USER}"
      proxy_password: "${PLANTS_PROXY_PASSWORD}"

  # ── Weather via Open-Meteo (free, no API key) ──────────────────────────
  - id: weather
    enabled: true
    interval: ${WEATHER_INTERVAL}
    config:
      latitude: ${WEATHER_LAT}
      longitude: ${WEATHER_LON}
      timezone: "${WEATHER_TZ}"
      location_name: "${WEATHER_LOCATION}"

  # ── Router stats via SSH (OpenWrt) ─────────────────────────────────────
  # ROUTER_SSH_KEY_B64 — приватный SSH-ключ в base64, читается из env
  - id: router
    enabled: true
    interval: ${ROUTER_INTERVAL}
    config:
      host: "${ROUTER_HOST}"
      user: "${ROUTER_USER}"

  # ── Proxy / VPN health checks ───────────────────────────────────────────
  - id: proxy
    enabled: true
    interval: ${PROXY_INTERVAL}
    config:
      router_host: "${ROUTER_HOST}"
      router_port: 1080
      vega_host:   "${PROXY_VEGA_HOST}"
      vega_user:   "${PROXY_VEGA_USER}"
      vega_pass:   "${PROXY_VEGA_PASS}"
