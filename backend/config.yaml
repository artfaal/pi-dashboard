# Pi Dashboard — backend module configuration
# Значения берутся из .env (через docker-compose env_file).
# Синтаксис: ${VAR} — подставляется из окружения контейнера.

modules:

  # ── CO2 sensor via co2mond Prometheus metrics ──────────────────────────
  - id: co2
    enabled: true
    interval: ${CO2_INTERVAL}
    config:
      metrics_url: "${CO2_METRICS_URL}"

  # ── Internet connectivity check ────────────────────────────────────────
  - id: internet
    enabled: true
    interval: ${INTERNET_INTERVAL}
    config:
      targets:
        - name: "Google"
          url: "https://8.8.8.8"
        - name: "Cloudflare"
          url: "https://1.1.1.1"
        - name: "Яндекс"
          url: "https://ya.ru"

  # ── Plants (tuya-exporter → Pushgateway) ──────────────────────────────
  - id: plants
    enabled: true
    interval: ${PLANTS_INTERVAL}
    config:
      pushgateway_url: "${PLANTS_PUSHGATEWAY_URL}"

  # ── Weather via Open-Meteo (free, no API key) ──────────────────────────
  - id: weather
    enabled: true
    interval: ${WEATHER_INTERVAL}
    config:
      latitude: ${WEATHER_LAT}
      longitude: ${WEATHER_LON}
      timezone: "${WEATHER_TZ}"
      location_name: "${WEATHER_LOCATION}"

  # ── Router stats via SSH (OpenWrt) ─────────────────────────────────────
  # ROUTER_SSH_KEY_B64 — приватный SSH-ключ в base64, читается из env
  - id: router
    enabled: true
    interval: ${ROUTER_INTERVAL}
    config:
      host: "${ROUTER_HOST}"
      user: "${ROUTER_USER}"

  # ── Torrent client (Transmission RPC) + disk space via SSH ────────────
  - id: torrent
    enabled: true
    interval: ${TORRENT_INTERVAL}
    config:
      transmission_host: "${TORRENT_HOST}"
      transmission_port: ${TORRENT_PORT}
      transmission_user: "${TORRENT_USER}"
      transmission_pass: "${TORRENT_PASS}"
      ssh_host:          "${TORRENT_SSH_HOST}"
      ssh_user:          "${TORRENT_SSH_USER}"

  # ── OpenClaw Gateway service (openclaw.local) ──────────────────────────
  - id: openclaw
    enabled: true
    interval: ${OPENCLAW_INTERVAL}
    config:
      host: "${OPENCLAW_HOST}"
      user: "${OPENCLAW_USER}"

  # ── Plex Media Server ──────────────────────────────────────────────────
  - id: plex
    enabled: true
    interval: ${PLEX_INTERVAL}
    config:
      host: "${PLEX_HOST}"
      token: "${PLEX_TOKEN}"
      recent_limit: 12

